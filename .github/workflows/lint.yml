on: [push, pull_request]        # yamllint disable-line rule:truthy
name: Plugin lint

permissions:
  contents: read      # restrict repo access
  actions: none       # no workflow modification
  checks: none
  deployments: none
  issues: none
  packages: none
  pull-requests: none
  repository-projects: none
  security-events: none
  statuses: none

jobs:
  plugin-lint:
    uses: coreruleset/crs-plugin-test-action/.github/workflows/lint.yaml@7e1ee6d07105ae3cb6eec95e45acb5e1a895e3d4 # pinned SHA for v3.0.0
    secrets: inherit
